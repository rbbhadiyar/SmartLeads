version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: smart-leads-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - '27017:27017'

  backend:
    build: ./backend
    container_name: smart-leads-backend
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/smart-leads
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d
      CLIENT_URL: http://localhost
    ports:
      - '5000:5000'

  frontend:
    build: ./frontend
    container_name: smart-leads-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '80:80'

volumes:
  mongo_data:
